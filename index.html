<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golf Round Tracker</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #222222;
      --accent: #4caf50;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --text: #eeeeee;
      --accent: #81c784;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Open Sans', sans-serif;
      padding: 1rem;
      transition: all 0.3s ease;
    }
    h2 {
      margin-top: 1rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
    }
    button, input {
      padding: 0.5rem;
      margin: 0.3rem;
      border-radius: 5px;
      font-size: 1rem;
    }
    input {
      border: 1px solid #ccc;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
    }
    .toggle {
      border: 2px solid var(--accent);
      background: none;
      color: var(--accent);
    }
    .section {
      margin-top: 1.5rem;
      padding: 1rem;
      border: 1px dashed var(--accent);
      border-radius: 8px;
    }
    table {
      width: 100%;
      margin-top: 1rem;
      border-collapse: collapse;
    }
    td, th {
      padding: 0.3rem;
      border: 1px solid #ccc;
      text-align: center;
    }
  </style>
</head>
<body data-theme="light">
  <div class="logo">⛳ Golf Round Tracker</div>
  <button class="toggle" onclick="toggleTheme()">Toggle Dark Mode</button>
  <button class="toggle" onclick="resetAll()">Reset Tracker</button>
  <label><input type="checkbox" id="stablefordToggle"> Use Stableford Scoring</label>

<h3>Select Course</h3>
<select id="country" onchange="updateCourses()">
  <option value="">-- Select Country --</option>
  <option value="England">England</option>
  <option value="USA">USA</option>
</select>

<select id="course" onchange="updateTees()">
  <option value="">-- Select Course --</option>
</select>

<select id="tee" onchange="populateCourseInfo()">
  <option value="">-- Select Tee --</option>
</select>

  <div class="section">
    <h2>Course Info</h2>
    <input type="number" id="slope" placeholder="Slope Rating">
    <input type="number" id="rating" placeholder="Course Rating">
    <input type="number" id="par" placeholder="Course Par">
  </div>

  <div class="section">
    <h2>Players</h2>
    <div id="players"></div>
    <button onclick="addPlayer()">Add Player</button>
    <button onclick="calculateHandicaps()">Calculate Handicaps</button>
    <div id="handicapResults"></div>
  </div>

  <div class="section">
    <h2>Scores</h2>
    <div id="scoreTracker"></div>
  </div>

  <div class="section">
    <h2>Leaderboard</h2>
    <div id="leaderboard"></div>
  </div>

  <script>
    let playerCount = 0;
    const players = [];

    function toggleTheme() {
      const body = document.body;
      body.dataset.theme = body.dataset.theme === "light" ? "dark" : "light";
    }

    function resetAll() {
      location.reload();
    }

    function addPlayer() {
      const id = playerCount;
      const div = document.createElement("div");
      div.innerHTML = `
        <input type="text" id="name${id}" placeholder="Player Name">
        <input type="number" id="index${id}" placeholder="Handicap Index">
      `;
      document.getElementById("players").appendChild(div);
      playerCount++;
    }

    function calculateHandicaps() {
      const slope = parseFloat(document.getElementById("slope").value);
      const rating = parseFloat(document.getElementById("rating").value);
      const par = parseFloat(document.getElementById("par").value);

      players.length = 0;
      for (let i = 0; i < playerCount; i++) {
        const name = document.getElementById(`name${i}`).value;
        const index = parseFloat(document.getElementById(`index${i}`).value);
        const handicap = Math.round((index * slope) / 113 + (rating - par));
        players.push({ name, handicap, scores: [] });
      }

      const min = Math.min(...players.map(p => p.handicap));
      let resultHTML = "";
      players.forEach(p => {
        p.strokes = p.handicap - min;
        resultHTML += `<p>${p.name}: Playing Handicap = ${p.handicap}, Strokes Given = ${p.strokes}</p>`;
      });
      document.getElementById("handicapResults").innerHTML = resultHTML;

      generateScoreInputs();
    }

    function generateScoreInputs() {
      const tracker = document.getElementById("scoreTracker");
      tracker.innerHTML = "";

      for (let h = 1; h <= 18; h++) {
        const row = document.createElement("div");
        row.innerHTML = `<strong>Hole ${h}</strong><br>`;
        players.forEach((p, i) => {
          row.innerHTML += `
            ${p.name}: <input type="number" id="score${i}_h${h}" onchange="updateLeaderboard()">
          `;
        });
        tracker.appendChild(row);
      }

      updateLeaderboard();
    }

    function updateLeaderboard() {
      const stablefordMode = document.getElementById("stablefordToggle").checked;
      players.forEach((p, i) => {
        p.totalGross = 0;
        p.totalNet = 0;
        p.totalStableford = 0;
        p.scores = [];

        for (let h = 1; h <= 18; h++) {
          const val = parseInt(document.getElementById(`score${i}_h${h}`)?.value || 0);
          p.scores.push(val);
          p.totalGross += val;

          const net = val - p.strokes; // simple offset
          p.totalNet += net;

          if (stablefordMode) {
            const par = parseFloat(document.getElementById("par").value);
            const netDiff = par - net;
            let points = 0;
            if (netDiff === -2) points = 0;
            else if (netDiff === -1) points = 1;
            else if (netDiff === 0) points = 2;
            else if (netDiff === 1) points = 3;
            else if (netDiff === 2) points = 4;
            else if (netDiff >= 3) points = 5;
            p.totalStableford += points;
          }
        }
      });

      let lbHTML = `<table><tr><th>Player</th><th>Gross</th><th>Net</th>`;
      if (document.getElementById("stablefordToggle").checked) lbHTML += `<th>Stableford</th>`;
      lbHTML += `</tr>`;

      players.forEach(p => {
        lbHTML += `<tr><td>${p.name}</td><td>${p.totalGross}</td><td>${p.totalNet}</td>`;
        if (document.getElementById("stablefordToggle").checked) lbHTML += `<td>${p.totalStableford}</td>`;
        lbHTML += `</tr>`;
      });
      lbHTML += `</table>`;

      document.getElementById("leaderboard").innerHTML = lbHTML;
    }
const golfCourses = {
  England: {
    "Stowmarket Golf Club": {
      "White (M)": { slope: 123, rating: 69.5, par: 69 },
      "Yellow (M)": { slope: 120, rating: 68.6, par: 69 }
    }
  },
  USA: {
    "Pebble Beach": {
      "Black": { slope: 144, rating: 75.5, par: 72 }
    },
    "Augusta National": {
      "Member": { slope: 135, rating: 74.0, par: 72 }
    }
  }
};

function updateCourses() {
  const country = document.getElementById("country").value;
  const courseSelect = document.getElementById("course");
  courseSelect.innerHTML = `<option value="">-- Select Course --</option>`;
  
  if (golfCourses[country]) {
    Object.keys(golfCourses[country]).forEach(course => {
      const option = document.createElement("option");
      option.value = course;
      option.textContent = course;
      courseSelect.appendChild(option);
    });
  }
  document.getElementById("tee").innerHTML = `<option value="">-- Select Tee --</option>`;
}

function updateTees() {
  const country = document.getElementById("country").value;
  const course = document.getElementById("course").value;
  const teeSelect = document.getElementById("tee");
  teeSelect.innerHTML = `<option value="">-- Select Tee --</option>`;

  if (golfCourses[country] && golfCourses[country][course]) {
    Object.keys(golfCourses[country][course]).forEach(tee => {
      const option = document.createElement("option");
      option.value = tee;
      option.textContent = tee;
      teeSelect.appendChild(option);
    });
  }
}

function populateCourseInfo() {
  const country = document.getElementById("country").value;
  const course = document.getElementById("course").value;
  const tee = document.getElementById("tee").value;

  if (
    golfCourses[country] &&
    golfCourses[country][course] &&
    golfCourses[country][course][tee]
  ) {
    const { slope, rating, par } = golfCourses[country][course][tee];
    document.getElementById("slope").value = slope;
    document.getElementById("rating").value = rating;
    document.getElementById("par").value = par;
  }
}
  </script>
</body>
</html>
